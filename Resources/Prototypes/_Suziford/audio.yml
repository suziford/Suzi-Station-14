# Robotics

- type: ambientMusic
  id: SuziRobotics
  sound:
    params:
      volume: -12
    collection: SuziAmbienceRobotics
  rules: SuziNearRobotics
  priority: 4

- type: rules
  id: SuziNearRobotics
  rules:
    - !type:NearbyEntitiesRule
      count: 1
      whitelist:
        tags:
          - SuziRoboticsAmbience
      range: 4

- type: soundCollection
  id: SuziAmbienceRobotics
  files:
    - /Audio/_Suziford/Ambience/robotics_1.ogg
    - /Audio/_Suziford/Ambience/robotics_2.ogg

