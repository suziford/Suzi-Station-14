- type: entity
  parent: BasePDA
  id: MinerPDA
  name: miner PDA
  description: Smells like ash.
  components:
  - type: Sprite
#    sprite: _Lavaland/Objects/Devices/pda.rsi # Orion-Edit: Removed
  # Orion-Start
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
      state: pda_base
      color: "#B8860B"
    - state: pda_buttons
    - state: pda_stripe_thick
      color: "#9932CC"
    - map: [ "enum.PdaVisualLayers.Screen" ]
      state: pda_screen_borders
    - state: light_overlay
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      shader: unshaded
      visible: false
    - state: id_overlay
      map: [ "enum.PdaVisualLayers.IdLight" ]
      shader: unshaded
      visible: false
    - state: "insert_overlay" # Goob
      map: [ "enum.PdaVisualLayers.Pen" ]
  # Orion-End
  - type: Pda
    id: MinerIDCard
  - type: PdaBorderColor
    borderColor: "#B8860B" # Orion-Edit
    accentVColor: "#9932CC" # Orion-Edit
  - type: CartridgeLoader
    uiKey: enum.PdaUiKey.Key
    preinstalled:
      - CrewManifestCartridge
      - NotekeeperCartridge
      - NanoTaskCartridge
      - NewsReaderCartridge
      - AstroNavCartridge
      - NanoChatCartridge # DeltaV
